<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Fútbol</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, Helvetica, sans-serif;
}

body {
    background: #e5e5e5;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.contenedor {
    background: white;
    width: 400px;
    padding: 35px;
    border-radius: 15px;
    box-shadow: 0px 5px 20px rgba(0,0,0,0.2);
    text-align: center;
}

h1 {
    color: #1e4620;
    margin-bottom: 10px;
}

h2 {
    color: #444;
    margin-bottom: 25px;
}

form {
    display: flex;
    flex-direction: column;
}

label {
    text-align: left;
    margin-bottom: 5px;
    font-weight: bold;
    color: #333;
}

input {
    padding: 12px;
    margin-bottom: 18px;
    border: 1px solid #bbb;
    border-radius: 8px;
    font-size: 16px;
}

input:focus {
    border: 2px solid #1e4620;
    outline: none;
}

button {
    background: #1e4620;
    color: white;
    border: none;
    padding: 12px;
    border-radius: 8px;
    font-size: 17px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #2d6a31;
}

p {
    margin-top: 20px;
}

a {
    color: #1e4620;
    text-decoration: none;
    font-weight: bold;
}

a:hover {
    text-decoration: underline;
}

/* Texto + botón de registro */
.registro {
    margin-top: 20px;
    font-size: 15px;
    color: #333;
}

.btn-registro {
    background: white;
    color: #1e4620;
    border: 2px solid #1e4620;
    padding: 6px 14px;
    margin-left: 6px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

.btn-registro:hover {
    background: #1e4620;
    color: white;
}
</style>
</head>
<body>

<div class="contenedor">
    <h1>Login Fútbol</h1>
    <h2>Iniciá sesión para continuar</h2>

    <form action="#" method="POST">
        <label for="usuario">Usuario:</label>
        <input type="text" id="usuario" name="usuario" required>

        <label for="contrasena">Contraseña:</label>
        <input type="password" id="contrasena" name="contrasena" required>

        <button type="submit">Iniciar Sesión</button>
    </form>

    <div class="registro">
        ¿No tienes cuenta? 
        <button class="btn-registro" onclick="location.href='registro.html'">Regístrate acá</button>
    </div>
</div>

</body>
</html>
